<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parqueadero - Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">ParqueaderoApp</div>
    <div class="nav-links">
      <a href="index.html" class="active">Registro</a>
      <a href="mensualidades.html">Mensualidades</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="showSection('registro')">Registrar Usuario</button>
      <button class="tab-btn" onclick="showSection('lista')">Usuarios Registrados</button>
    </div>

    <div id="registro" class="section active">
      <div class="card">
        <h2>Registrar Nuevo Usuario</h2>
        <form id="formUsuario">
          <div class="form-group">
            <label for="placa">Placa del vehiculo</label>
            <input type="text" id="placa" placeholder="Ej: ABC123" required maxlength="10">
          </div>
          <div class="form-group">
            <label for="nombre">Nombre del propietario</label>
            <input type="text" id="nombre" placeholder="Nombre completo" required>
          </div>
          <div class="form-group">
            <label for="fechaRegistro">Fecha de registro</label>
            <input type="date" id="fechaRegistro" required>
          </div>
          <button type="submit" class="btn btn-primary">Registrar</button>
        </form>
        <div id="mensajeUsuario" class="message"></div>
      </div>
    </div>

    <div id="lista" class="section">
      <div class="card">
        <h2>Usuarios Registrados</h2>
        <div class="search-box">
          <input type="text" id="buscarPlaca" placeholder="Buscar por placa..." oninput="filtrarUsuarios()">
        </div>
        <table id="tablaUsuarios">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Nombre</th>
              <th>Fecha Registro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <p id="sinUsuarios" class="empty-message">No hay usuarios registrados</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
