<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parqueadero - Mensualidades</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">ParqueaderoApp</div>
    <div class="nav-links">
      <a href="index.html">Registro</a>
      <a href="mensualidades.html" class="active">Mensualidades</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </nav>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="showSection('pago')">Registrar Pago</button>
      <button class="tab-btn" onclick="showSection('historial')">Historial de Pagos</button>
    </div>

    <div id="pago" class="section active">
      <div class="card">
        <h2>Registrar Mensualidad</h2>
        <form id="formMensualidad">
          <div class="form-group">
            <label for="placaPago">Placa del vehiculo</label>
            <input type="text" id="placaPago" placeholder="Ej: ABC123" required maxlength="10" list="placasDisponibles">
            <datalist id="placasDisponibles"></datalist>
          </div>
          <div class="form-group">
            <label for="propietario">Propietario</label>
            <input type="text" id="propietario" readonly placeholder="Se autocompleta con la placa">
          </div>
          <div class="form-group">
            <label for="mes">Mes a pagar</label>
            <select id="mes" required>
              <option value="">Seleccione mes</option>
              <option value="Enero">Enero</option>
              <option value="Febrero">Febrero</option>
              <option value="Marzo">Marzo</option>
              <option value="Abril">Abril</option>
              <option value="Mayo">Mayo</option>
              <option value="Junio">Junio</option>
              <option value="Julio">Julio</option>
              <option value="Agosto">Agosto</option>
              <option value="Septiembre">Septiembre</option>
              <option value="Octubre">Octubre</option>
              <option value="Noviembre">Noviembre</option>
              <option value="Diciembre">Diciembre</option>
            </select>
          </div>
          <div class="form-group">
            <label for="anio">Anio</label>
            <input type="number" id="anio" min="2020" max="2030" required>
          </div>
          <div class="form-group">
            <label for="valorPagado">Valor pagado ($)</label>
            <input type="number" id="valorPagado" min="0" step="1000" placeholder="Ej: 150000" required>
          </div>
          <button type="submit" class="btn btn-primary">Registrar Pago</button>
        </form>
        <div id="mensajePago" class="message"></div>
      </div>
    </div>

    <div id="historial" class="section">
      <div class="card">
        <h2>Historial de Mensualidades</h2>
        <div class="filters">
          <select id="filtroMes" onchange="filtrarHistorial()">
            <option value="">Todos los meses</option>
            <option value="Enero">Enero</option>
            <option value="Febrero">Febrero</option>
            <option value="Marzo">Marzo</option>
            <option value="Abril">Abril</option>
            <option value="Mayo">Mayo</option>
            <option value="Junio">Junio</option>
            <option value="Julio">Julio</option>
            <option value="Agosto">Agosto</option>
            <option value="Septiembre">Septiembre</option>
            <option value="Octubre">Octubre</option>
            <option value="Noviembre">Noviembre</option>
            <option value="Diciembre">Diciembre</option>
          </select>
          <select id="filtroAnio" onchange="filtrarHistorial()">
            <option value="">Todos los anios</option>
          </select>
        </div>
        <table id="tablaMensualidades">
          <thead>
            <tr>
              <th>Placa</th>
              <th>Propietario</th>
              <th>Mes</th>
              <th>Anio</th>
              <th>Valor</th>
              <th>Fecha Pago</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <p id="sinPagos" class="empty-message">No hay mensualidades registradas</p>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="mensualidades.js"></script>
</body>
</html>
